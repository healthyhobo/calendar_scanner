# ============================================================
#  Calendar Spread Scanner — Configuration
# ============================================================

orats:
  base_url: "https://api.orats.io/datav2"
  rate_limit_pause: 1.1          # seconds between API calls

ibkr:
  host: "127.0.0.1"
  port: 7497                     # 7497=TWS paper, 7496=TWS live, 4002=GW paper, 4001=GW live
  client_id: 10

# ── Universe ─────────────────────────────────────────────────────────────
universe:
  # Liquid ETFs — preferred for calendars: tight spreads, no earnings risk
  - SPY
  - QQQ
  - IWM
  - XLF
  - XLE
  - GLD
  - TLT
  - HYG
  - EFA
  - EEM
  # High-volume single stocks — wider bid-ask, earnings risk, but more
  # frequent term-structure dislocations
  - TSLA
  - AAPL
  - NVDA
  - AMZN
  - AMD
  - META
  - MSFT
  - AMC
  - GOOGL
  - PLTR
  - BAC
  - BABA
  - GOOG
  - MARA
  - INTC
  - SOFI
  - NIO
  - COIN
  - NFLX
  # - F

# ── Backtest date range ──────────────────────────────────────────────────
backtest:
  start_date: "2021-01-04"
  end_date: "2026-01-31"
  initial_capital: 100000.0

# ── Expiration selection ─────────────────────────────────────────────────
# Front: aim for ~30 DTE (enough time for spread to normalize, not too much gamma drag)
# Back:  aim for ~60 DTE (enough DTE separation to create a meaningful spread)
expiry:
  front_dte_min: 10              # hard floor — below this gamma drag is excessive
  front_dte_max: 45
  front_dte_target: 30
  back_dte_min: 30
  back_dte_max: 80
  back_dte_target: 60
  min_gap_days: 10               # must have ≥10 days between front and back expiry
  use_monthlies_only: true       # skip weeklies — smaller vega differential

# ── DTE range for strike-level lookups (MTM validation only) ─────────────
# These are only used by fetch_strikes_single_date() for production P&L checks.
# Increase fetch_dte_min if you want to avoid near-expiry illiquidity.
fetch_dte_min: 5
fetch_dte_max: 90

# ── Feature engineering parameters ──────────────────────────────────────
features:
  signal_source: constant_maturity   # use iv30d/iv60d, not atmIvM1/M2
  lookback_days: 252                 # rolling window for z-score + percentile
  rv_window: 20                      # realized vol lookback (trading days)
  min_history_days: 60               # minimum history before a row is scored

# ── Signal thresholds ────────────────────────────────────────────────────
# The strategy enters when the term structure is statistically dislocated
# but NOT in a full-blown stress regime (which triggers excessive gamma drag).
signals:
  # Z-score band: 1.5 = meaningful dislocation, 3.5 = likely event risk
  zscore_entry_min: 1.5
  zscore_entry_max: 3.5

  # Percentile gate: must be in top 20% of historical spread distribution
  percentile_entry_min: 80

  # ENABLED: Back-month IV absolute-level filter.
  # Rejects entries when back-month IV is in the top 40% of its history.
  # High absolute vol → severe gamma drag during the hold period.
  # Evidence: Israelov (AQR, 2017) shows short-vega strategies entered at
  # high IV percentile consistently underperform vs. low-IV entries.
  # Set to null to disable (original behaviour — not recommended).
  back_iv_percentile_max: 60

  # ENABLED: Realized-vol / implied-vol ratio filter.
  # Front IV must be at least 10% above realized vol to be "genuinely rich".
  # If rv_iv_ratio > 1 the front is not rich — it's just pricing realized moves.
  # Set to null to disable.
  rv_iv_ratio_max: 0.9

  # ENABLED: Gamma drag filter.
  # Rejects entries where the estimated daily gamma drag exceeds 15% of the
  # calendar debit. At 15%/day, a 10-day hold costs ~150% of debit in drag.
  # This excludes the highest-vol regimes where gamma cost consumes the edge.
  # Set to null to disable.
  max_gamma_drag_pct_of_debit: 0.15

  # Exit when spread z-score normalizes to this level (mean reversion complete)
  zscore_exit: 0.5

  require_positive_spread: true

# ── Liquidity filters ────────────────────────────────────────────────────
# Using aggregate option volume from ORATS cores (not per-strike OI).
# These floors ensure entries are executable at reasonable bid-ask.
liquidity:
  min_stock_price: 20.0
  min_option_volume: 5000           # total daily volume (calls + puts)
  min_avg_opt_volume_20d: 10000     # 20-day average from cores

# ── Entry rules ──────────────────────────────────────────────────────────
entry:
  max_concurrent_positions: 10
  max_positions_per_ticker: 1       # no stacking on same name
  max_debit_pct_of_spot: 0.02       # calendar debit ≤ 2% of underlying price

# ── Exit rules ───────────────────────────────────────────────────────────
exit:
  profit_target_pct: 0.25           # +25% of calendar debit paid
  stop_loss_pct: -0.30              # -30% of calendar debit paid
  time_stop_dte: 5                  # exit when front leg has ≤5 DTE (pin risk)
  max_hold_days: 45                 # absolute calendar-day cap
  min_hold_days: 3                  # suppress noise exits in first N days
                                    # (ORATS IV interpolation can trigger false
                                    #  normalization signals on day 1-2)

# ── Slippage and transaction costs ──────────────────────────────────────
# Baseline: 3% (tight-spread liquid names).
# Conservative test: run at 7% — if edge disappears, it's not real.
# For high-beta names (MARA, AMC, NIO) real slippage is 8-15%.
costs:
  slippage_pct: 0.03
  commission_per_contract: 0.65     # per-leg; calendar has 2 legs = $1.30 total
  contracts_per_trade: 1

# ── Position sizing ──────────────────────────────────────────────────────
sizing:
  risk_per_trade_pct: 0.005         # 0.5% of portfolio equity per trade
  max_oi_pct: 0.05                  # never exceed 5% of ATM OI (liquidity guard)
